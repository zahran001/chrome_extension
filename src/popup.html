<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubber-Band AI Settings</title>
  <link rel="stylesheet" href="./ui/popup.css">
</head>
<body>
  <div class="popup-container">
    <header>
      <h1>Rubber-Band AI</h1>
      <p class="subtitle">Gemini API Settings</p>
    </header>

    <section class="key-section">
      <label for="api-key">Gemini API Key</label>
      <div class="input-wrapper">
        <input
          type="password"
          id="api-key"
          placeholder="AIza..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="toggle-visibility" class="icon-btn" aria-label="Toggle key visibility" title="Show/hide key">
          <span id="eye-icon">&#128065;</span>
        </button>
      </div>
      <div id="key-status" class="key-status" role="alert" aria-live="polite"></div>
    </section>

    <div class="button-row">
      <button id="test-key" class="secondary-btn">Test Key</button>
      <button id="clear-key" class="danger-btn">Clear</button>
      <button id="save-key" class="primary-btn">Save</button>
    </div>

    <footer>
      <p class="footer-note">Your key is stored locally. Zero telemetry.</p>
    </footer>
  </div>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
