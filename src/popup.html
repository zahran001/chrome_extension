<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scoop Settings</title>
  <link rel="stylesheet" href="./ui/popup.css">
</head>
<body>
  <div class="popup-container">
    <header>
      <h1>Scoop</h1>
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="settings">Settings</button>
        <button class="tab-btn" data-tab="bookmarks">Bookmarks</button>
      </nav>
    </header>

    <!-- Settings tab -->
    <div id="tab-settings" class="tab-panel">
      <section class="key-section">
        <label for="api-key">OpenAI API Key</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="api-key"
            placeholder="sk-..."
            autocomplete="off"
            spellcheck="false"
          />
          <button id="toggle-visibility" class="icon-btn" aria-label="Toggle key visibility" title="Show/hide key">
            <span id="eye-icon">&#128065;</span>
          </button>
        </div>
        <div id="key-status" class="key-status" role="alert" aria-live="polite"></div>
        <p class="sm-hint"><a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">Get a key at platform.openai.com</a></p>
      </section>

      <div class="button-row">
        <button id="test-key" class="secondary-btn">Test Key</button>
        <button id="clear-key" class="danger-btn">Clear</button>
        <button id="save-key" class="primary-btn">Save</button>
      </div>

      <section class="key-section sm-section">
        <label for="sm-api-key">Supermemory API Key <span class="optional-badge">optional</span></label>
        <div class="input-wrapper">
          <input
            type="password"
            id="sm-api-key"
            placeholder="sm-..."
            autocomplete="off"
            spellcheck="false"
          />
          <button id="sm-toggle-visibility" class="icon-btn" aria-label="Toggle Supermemory key visibility" title="Show/hide key">
            <span id="sm-eye-icon">&#128065;</span>
          </button>
        </div>
        <div id="sm-key-status" class="key-status" role="alert" aria-live="polite"></div>
        <div class="sm-button-row">
          <button id="sm-clear-key" class="danger-btn">Clear</button>
          <button id="sm-save-key" class="primary-btn">Save</button>
        </div>
        <p class="sm-hint">Enables &#8220;Bookmark &#9734;&#8221; on results. <a href="https://supermemory.ai" target="_blank" rel="noopener">Get a free key</a></p>
      </section>

      <footer>
        <p class="footer-note">Your keys are stored locally. Zero telemetry.</p>
      </footer>
    </div>

    <!-- Bookmarks tab -->
    <div id="tab-bookmarks" class="tab-panel hidden">
      <div id="bookmarks-list" class="bookmarks-list">
        <p class="bookmarks-empty">Loading bookmarks...</p>
      </div>
    </div>
  </div>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
